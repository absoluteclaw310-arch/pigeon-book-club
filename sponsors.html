<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 Sponsors | Feathers & Fun Summer Festival</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        h1, h2 { font-family: 'Bungee', cursive; }
        .gradient-bg { background: linear-gradient(135deg, #fcd34d 0%, #fbbf24 100%); }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

    <!-- TOP NAVIGATION BAR -->
    <div class="bg-black text-white py-3 px-4 sticky top-0 z-50">
        <div class="flex items-center justify-between max-w-7xl mx-auto">
            <a href="index.html" class="text-sm md:text-lg font-bold uppercase tracking-widest hover:text-yellow-400 transition-colors">← Back to Home</a>
        </div>
        <div class="text-center mt-1">
            <p class="text-sm md:text-lg font-bold uppercase tracking-widest block mb-1">Event Starts In:</p>
            <p id="timer" class="text-yellow-400 text-2xl md:text-3xl font-black mb-1">Loading...</p>
            <p class="text-lg md:text-xl font-black text-red-600 uppercase drop-shadow-sm">Sunday July 12, 2026</p>
        </div>
    </div>

    <!-- HERO SECTION -->
    <header class="relative h-80 flex items-center justify-center text-center px-4 gradient-bg overflow-hidden">
        <div class="absolute inset-0 opacity-40 scale-110">
            <img src="images/fest_9.jpg" alt="Festival Background" class="w-full h-full object-cover">
        </div>
        <div class="relative z-10 max-w-4xl">
            <h1 class="text-5xl md:text-7xl text-white drop-shadow-lg mb-4">Our Sponsors</h1>
            <p class="text-xl md:text-2xl text-white font-black drop-shadow-[0_4px_4px_rgba(0,0,0,0.8)] bg-black bg-opacity-40 px-6 py-4 rounded-2xl inline-block backdrop-blur-sm">Support the businesses that support our community.</p>
        </div>
    </header>

    <!-- SPONSOR GALLERY -->
    <section class="py-20 px-4 max-w-7xl mx-auto text-center">

    <!-- SPONSOR GALLERY -->

        <h2 class="text-4xl mb-12 text-gray-800">2026 Partners</h2>
        <div id="sponsor-grid" class="grid grid-cols-1 md:grid-cols-3 gap-8 items-center justify-items-center">
            
            <div class="p-4 bg-white rounded-2xl shadow-lg border-2 border-gray-100 w-full flex items-center justify-center cursor-pointer hover:shadow-2xl transition" onclick="openLightbox(0)">
                <img src="images/sponsor_wings_of_peace.png" alt="Wings of Peace" class="max-h-48 w-auto object-contain">
            </div>
            
            <div class="p-4 bg-white rounded-2xl shadow-lg border-2 border-gray-100 w-full flex items-center justify-center cursor-pointer hover:shadow-2xl transition" onclick="openLightbox(1)">
                <img src="images/sponsor_sign_bandits.png" alt="Sign Bandits" class="max-h-48 w-auto object-contain">
            </div>
            
            <div class="p-4 bg-white rounded-2xl shadow-lg border-2 border-gray-100 w-full flex items-center justify-center cursor-pointer hover:shadow-2xl transition" onclick="openLightbox(2)">
                <img src="images/sponsor_tricity_auto.jpg" alt="Tri-City Auto Sales" class="max-h-48 w-auto object-contain">
            </div>

            <div class="p-4 bg-white rounded-2xl shadow-lg border-2 border-gray-100 w-full flex items-center justify-center cursor-pointer hover:shadow-2xl transition" onclick="openLightbox(3)">
                <img src="images/sponsor_new_cool.jpg" alt="New Cool" class="max-h-48 w-auto object-contain">
            </div>

            <div class="p-4 bg-white rounded-2xl shadow-lg border-2 border-gray-100 w-full flex items-center justify-center cursor-pointer hover:shadow-2xl transition" onclick="openLightbox(4)">
                <img src="images/sponsor_n_ribbon.jpg" alt="N Ribbon" class="max-h-48 w-auto object-contain">
            </div>

            <div class="p-4 bg-white rounded-2xl shadow-lg border-2 border-gray-100 w-full flex items-center justify-center cursor-pointer hover:shadow-2xl transition" onclick="openLightbox(5)">
                <img src="images/new_sponsor.jpg" alt="518 Collision" class="max-h-48 w-auto object-contain">
            </div>

            <div class="p-4 bg-white rounded-2xl shadow-lg border-2 border-gray-100 w-full flex items-center justify-center cursor-pointer hover:shadow-2xl transition" onclick="openLightbox(6)">
                <img src="images/sponsor_new_2.jpg" alt="New Sponsor" class="max-h-48 w-auto object-contain">
            </div>

            <div class="p-4 bg-white rounded-2xl shadow-lg border-2 border-gray-100 w-full flex items-center justify-center cursor-pointer hover:shadow-2xl transition" onclick="openLightbox(7)">
                <img src="images/sponsor_manzi.jpg" alt="Manzi" class="max-h-48 w-auto object-contain">
            </div>

            <div class="p-8 bg-gray-50 rounded-2xl shadow-inner border-2 border-dashed border-gray-300 w-full h-48 flex items-center justify-center text-gray-400 font-bold uppercase tracking-widest">
                More Coming Soon
            </div>
        </div>
    </section>

    <!-- LIGHTBOX MODAL -->
    <div id="lightbox" class="fixed inset-0 z-[100] bg-black bg-opacity-90 hidden flex items-center justify-center">
        <button onclick="closeLightbox()" class="absolute top-6 right-6 text-white text-4xl hover:text-yellow-400 transition">&times;</button>
        <button onclick="prevImage()" class="absolute left-4 text-white text-5xl hover:text-yellow-400 transition">&#10094;</button>
        <img id="lightbox-img" src="" alt="Expanded Sponsor Logo" class="max-w-full max-h-[90vh] object-contain rounded-lg shadow-2xl p-4">
        <button onclick="nextImage()" class="absolute right-4 text-white text-5xl hover:text-yellow-400 transition">&#10095;</button>
    </div>

    <!-- FOOTER -->
    <footer class="py-12 bg-black text-gray-400 text-center px-4 mt-auto">
        <p class="text-xs uppercase tracking-widest">&copy; 2026 Feathers & Fun Summer Festival</p>
    </footer>

    <script>
        const targetDate = new Date('July 12, 2026 00:00:00').getTime();

        function updateTimer() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            const timerElement = document.getElementById('timer');
            if (timerElement) {
                timerElement.innerHTML = days + "d " + hours + "h " + minutes + "m " + seconds + "s ";
            }

            if (distance < 0 && timerElement) {
                timerElement.innerHTML = "EVENT HAS STARTED!";
            }
        }

        setInterval(updateTimer, 1000);
        updateTimer();

        // Lightbox Logic
        const sponsorImages = [
            "images/sponsor_wings_of_peace.png",
            "images/sponsor_sign_bandits.png",
            "images/sponsor_tricity_auto.jpg",
            "images/sponsor_new_cool.jpg",
            "images/sponsor_n_ribbon.jpg",
            "images/new_sponsor.jpg",
            "images/sponsor_new_2.jpg",
            "images/sponsor_manzi.jpg"
        ];
        let currentImageIndex = 0;

        function openLightbox(index) {
            currentImageIndex = index;
            document.getElementById("lightbox-img").src = sponsorImages[currentImageIndex];
            document.getElementById("lightbox").classList.remove("hidden");
            document.body.style.overflow = "hidden"; // Prevent scrolling behind modal
        }

        function closeLightbox() {
            document.getElementById("lightbox").classList.add("hidden");
            document.body.style.overflow = "auto";
        }

        function nextImage() {
            currentImageIndex = (currentImageIndex + 1) % sponsorImages.length;
            document.getElementById("lightbox-img").src = sponsorImages[currentImageIndex];
        }

        function prevImage() {
            currentImageIndex = (currentImageIndex - 1 + sponsorImages.length) % sponsorImages.length;
            document.getElementById("lightbox-img").src = sponsorImages[currentImageIndex];
        }

        // Close on escape key
        document.addEventListener('keydown', function(event) {
            if (event.key === "Escape" && !document.getElementById("lightbox").classList.contains("hidden")) {
                closeLightbox();
            }
        });
    </script>
</body>
</html>
