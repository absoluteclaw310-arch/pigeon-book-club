<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sponsorship Form | Feathers & Fun Summer Festival</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        h1, h2 { font-family: 'Bungee', cursive; }
        .gradient-bg { background: linear-gradient(135deg, #fcd34d 0%, #fbbf24 100%); }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen flex flex-col">

    <!-- TOP NAVIGATION BAR -->
    <div class="bg-black text-white py-3 px-4 sticky top-0 z-50">
        <div class="flex items-center justify-between max-w-7xl mx-auto">
            <a href="become-sponsor.html" class="text-sm md:text-lg font-bold uppercase tracking-widest hover:text-yellow-400 transition-colors">← Back to Tiers</a>
        </div>
    </div>

    <!-- HERO SECTION -->
    <header class="relative h-48 flex items-center justify-center text-center px-4 gradient-bg overflow-hidden">
        <div class="relative z-10 max-w-4xl">
            <h1 class="text-4xl md:text-6xl text-white drop-shadow-lg mb-2">Sponsorship Details</h1>
            <p class="text-lg text-white font-black drop-shadow-[0_4px_4px_rgba(0,0,0,0.8)] bg-black bg-opacity-40 px-6 py-2 rounded-xl inline-block backdrop-blur-sm">Finalize your sponsorship request</p>
        </div>
    </header>

    <!-- FORM SECTION -->
    <main class="flex-grow py-12 px-4">
        <div class="max-w-2xl mx-auto bg-white rounded-3xl shadow-2xl overflow-hidden border-2 border-gray-100">
            <div class="p-8">
                <form id="sponsor-form" class="space-y-6">
                    <!-- Hidden Tier Field -->
                    <input type="hidden" id="form-tier" name="tier" value="General">
                    
                    <div class="grid grid-cols-1 gap-6">
                        <div>
                            <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Business Name</label>
                            <input type="text" name="name" required placeholder="Your Company Name" class="w-full px-4 py-3 rounded-xl border-2 border-gray-100 focus:border-yellow-400 outline-none transition-all">
                        </div>
                        
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Phone Number</label>
                                <input type="tel" name="phone" required placeholder="(555) 555-5555" class="w-full px-4 py-3 rounded-xl border-2 border-gray-100 focus:border-yellow-400 outline-none transition-all">
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Email Address</label>
                                <input type="email" name="email" required placeholder="email@example.com" class="w-full px-4 py-3 rounded-xl border-2 border-gray-100 focus:border-yellow-400 outline-none transition-all">
                            </div>
                        </div>
                        
                        <div>
                            <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Additional Notes</label>
                            <textarea name="notes" rows="4" placeholder="Tell us about your business or any special requests..." class="w-full px-4 py-3 rounded-xl border-2 border-gray-100 focus:border-yellow-400 outline-none transition-all"></textarea>
                        </div>
                    </div>
                    
                    <div class="pt-6">
                        <button type="submit" class="w-full bg-black text-white py-4 rounded-xl font-bold text-lg hover:bg-gray-800 transition-all shadow-lg">Submit Sponsorship Request</button>
                    </div>
                </form>

                <!-- Success Message -->
                <div id="form-success" class="hidden text-center py-16">
                    <div class="text-7xl mb-4">🎉</div>
                    <h2 class="text-3xl font-bold mb-2">Request Sent!</h2>
                    <p class="text-gray-600 mb-8">Thank you for supporting the community. We'll contact you shortly to finalize everything.</p>
                    <a href="index.html" class="bg-black text-white px-8 py-3 rounded-xl font-bold hover:bg-gray-800 transition-all">Return Home</a>
                </div>
            </div>
        </div>
    </main>

    <!-- FOOTER -->
    <footer class="py-12 bg-black text-gray-400 text-center px-4">
        <p class="text-xs uppercase tracking-widest">&copy; 2026 Feathers & Fun Summer Festival</p>
    </footer>

    <script>
        // 1. Capture the Tier from the URL
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const tier = urlParams.get('tier');
            if (tier) {
                document.getElementById('form-tier').value = tier;
            }
        };

        // 2. Submit via the "Silent Bridge" (Hidden Iframe)
        document.getElementById('sponsor-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const formData = new FormData(this);
            const tier = document.getElementById('form-tier').value;
            
            // Google Form Entry IDs (verified from prefill link)
            const entries = {
                '600061920': formData.get('name'),
                '878167482': formData.get('phone'),
                '238550636': formData.get('email'),
                '1743288544': formData.get('notes'),
                '565258370': tier
            };

            // CRITICAL: Use /formResponse instead of /viewform to actually submit the data
            const baseUrl = 'https://docs.google.com/forms/d/e/1FAIpQLScUdIEtq_jzoGyuuNnr6MgH9KbgA_M-44rqfd7Vo_qHhnmoVQ/formResponse';
            
            const params = new URLSearchParams();
            for (const [id, value] of Object.entries(entries)) {
                params.append(`entry.${id}`, value);
            }

            const finalUrl = `${baseUrl}?${params.toString()}`;

            // The Silent Bridge
            const hiddenIframe = document.createElement('iframe');
            hiddenIframe.style.display = 'none';
            hiddenIframe.src = finalUrl;
            document.body.appendChild(hiddenIframe);

            // Visual Feedback
            document.getElementById('sponsor-form').classList.add('hidden');
            document.getElementById('form-success').classList.remove('hidden');

            setTimeout(() => {
                document.body.removeChild(hiddenIframe);
            }, 2000);
        });
    </script>
</body>
</html>
